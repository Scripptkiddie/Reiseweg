<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ebstorfer Weltkarte – Reiserouten</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #eee;
      font-family: 'Georgia', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 {
      margin: 24px 0 8px;
      font-size: 1.6rem;
      letter-spacing: 0.03em;
    }
    .subtitle {
      font-size: 0.95rem;
      color: #aaa;
      margin-bottom: 20px;
    }
    .map-container {
      position: relative;
      display: inline-block;
      max-width: 95vw;
      max-height: 80vh;
    }
    .map-container img.map {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 4px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    .map-container svg {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }
    /* Circles are clickable */
    .map-container svg .stop-circle { pointer-events: all; cursor: pointer; }
    .map-container svg .stop-circle.orange:hover { filter: brightness(1.3); }
    .map-container svg .stop-circle.yellow:hover { filter: brightness(1.2); }

    /* Tooltip */
    .tooltip {
      position: absolute;
      background: rgba(0,0,0,0.85);
      color: #fff;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 0.85rem;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      white-space: nowrap;
      z-index: 10;
    }
    .tooltip.visible { opacity: 1; }

    /* Legend */
    .legend {
      display: flex;
      gap: 28px;
      margin: 20px 0 30px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.95rem;
    }
    .legend-dot {
      width: 16px; height: 16px;
      border-radius: 50%;
      border: 2px solid #fff;
    }
    .legend-ellipse {
      width: 28px; height: 16px;
      border-radius: 50%;
      border: 2px solid #4080d8;
      background: rgba(64,128,216,0.2);
    }
    .avatar-row {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
    }
    .avatar-card {
      text-align: center;
      padding: 8px;
    }
    .avatar-card img {
      height: 100px;
      border-radius: 4px;
    }
    .avatar-card .name {
      margin-top: 4px;
      font-size: 0.85rem;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>Der Reiseweg auf der Ebstorfer Weltkarte</h1>
  <p class="subtitle">Klicke auf die orangenen Punkte, um mehr zu erfahren</p>

  <div class="map-container" id="mapContainer">
    <img class="map" src="ebstorf_map.jpg" alt="Ebstorfer Weltkarte" id="mapImg">
    <svg viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid meet" id="overlaySvg">
      <defs>
        <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <path d="M0,0 L8,3 L0,6 Z" fill="#ed7500"/>
        </marker>
        <marker id="arrowYellow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <path d="M0,0 L8,3 L0,6 Z" fill="#f2c000"/>
        </marker>
      </defs>

      <!-- Content will be generated by JS -->
    </svg>
    <div class="tooltip" id="tooltip"></div>
  </div>

  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot" style="background:#ed7500;"></div>
      <span>Herzog Ernst</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#f2c000;"></div>
      <span>Alexander</span>
    </div>
    <div class="legend-item">
      <div class="legend-ellipse"></div>
      <span>Brandan</span>
    </div>
  </div>

  <script>
    // ============================================================
    // Route data - positions as % of map image (0-100)
    // The map image contains the full Ebstorf map
    // Coordinate system: the circular map within the image
    // Map circle center ≈ (50, 50), radius ≈ 47%
    // ============================================================

    const orangeStops = [
      { x: 34, y: 73, label: "Bamberg / Regensburg", pdf: "pdfs/stop1.pdf" },
      { x: 10, y: 55, label: "Grippia", pdf: "pdfs/stop2.pdf" },
      { x: 16, y: 37, label: "Arimaspi", pdf: "pdfs/stop3.pdf" },
      { x: 22, y: 24, label: "Greifen / Ören", pdf: "pdfs/stop4.pdf" },
      { x: 43, y:  6, label: "Lebermeer / Magnetberg", pdf: "pdfs/stop5.pdf" },
      { x: 52, y: 47, label: "Jerusalem", pdf: "pdfs/stop6.pdf" },
      { x: 56, y: 76, label: "Rom", pdf: "pdfs/stop7.pdf" },
      { x: 35, y: 84, label: "Mainz", pdf: "pdfs/stop8.pdf" },
    ];

    const yellowStops = [
      { x: 53, y: 64, label: "Bari / Konstantinopel" },
      { x: 45, y: 57, label: "Akkon" },
      { x: 56, y: 31, label: "Babylon" },
      { x: 38, y: 33, label: "Östliche Lande" },
      { x: 36, y: 33, label: "Östliche Lande" },
      { x: 42, y: 16, label: "Talkkessel" },
      { x: 36, y: 12, label: "Ferner Osten" },
    ];

    const brandanEllipse = { cx: 18, cy: 78, rx: 10, ry: 8 };

    // ============================================================
    // SVG viewBox is 1000x1000, positions are in % -> multiply by 10
    // ============================================================
    const svg = document.getElementById('overlaySvg');
    const tooltip = document.getElementById('tooltip');
    const mapContainer = document.getElementById('mapContainer');

    function svgCoord(pct) { return pct * 10; }

    function createArrowPath(stops, color, markerId) {
      for (let i = 0; i < stops.length - 1; i++) {
        const x1 = svgCoord(stops[i].x);
        const y1 = svgCoord(stops[i].y);
        const x2 = svgCoord(stops[i+1].x);
        const y2 = svgCoord(stops[i+1].y);

        // Shorten line to not overlap circles
        const dx = x2 - x1, dy = y2 - y1;
        const len = Math.sqrt(dx*dx + dy*dy);
        const r = 14; // circle radius in SVG units
        const ux = dx/len, uy = dy/len;
        const sx = x1 + ux * (r + 3);
        const sy = y1 + uy * (r + 3);
        const ex = x2 - ux * (r + 5);
        const ey = y2 - uy * (r + 5);

        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("x1", sx);
        line.setAttribute("y1", sy);
        line.setAttribute("x2", ex);
        line.setAttribute("y2", ey);
        line.setAttribute("stroke", color);
        line.setAttribute("stroke-width", "2.5");
        line.setAttribute("stroke-opacity", "0.7");
        line.setAttribute("marker-end", `url(#${markerId})`);
        svg.appendChild(line);
      }
    }

    function createStops(stops, fillColor, textColor, className) {
      stops.forEach((stop, i) => {
        const cx = svgCoord(stop.x);
        const cy = svgCoord(stop.y);

        const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
        g.classList.add("stop-circle", className);
        g.dataset.label = stop.label;
        if (stop.pdf) g.dataset.pdf = stop.pdf;

        // Circle
        const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        circle.setAttribute("cx", cx);
        circle.setAttribute("cy", cy);
        circle.setAttribute("r", "12");
        circle.setAttribute("fill", fillColor);
        circle.setAttribute("fill-opacity", "0.9");
        circle.setAttribute("stroke", "#fff");
        circle.setAttribute("stroke-width", "1.5");
        g.appendChild(circle);

        // Number
        const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
        text.setAttribute("x", cx);
        text.setAttribute("y", cy + 4.5);
        text.setAttribute("text-anchor", "middle");
        text.setAttribute("fill", textColor);
        text.setAttribute("font-size", "13");
        text.setAttribute("font-weight", "bold");
        text.setAttribute("font-family", "Arial, sans-serif");
        text.textContent = i + 1;
        g.appendChild(text);

        // Event handlers
        g.addEventListener("mouseenter", (e) => {
          const rect = mapContainer.getBoundingClientRect();
          const px = (stop.x / 100) * rect.width;
          const py = (stop.y / 100) * rect.height;
          tooltip.textContent = `${i+1}. ${stop.label}`;
          tooltip.style.left = (px + 15) + "px";
          tooltip.style.top = (py - 10) + "px";
          tooltip.classList.add("visible");
        });
        g.addEventListener("mouseleave", () => {
          tooltip.classList.remove("visible");
        });
        g.addEventListener("click", () => {
          if (stop.pdf) {
            window.open(stop.pdf, '_blank');
          }
        });

        svg.appendChild(g);
      });
    }

    // Draw blue ellipse for Brandan
    const ellipse = document.createElementNS("http://www.w3.org/2000/svg", "ellipse");
    ellipse.setAttribute("cx", svgCoord(brandanEllipse.cx));
    ellipse.setAttribute("cy", svgCoord(brandanEllipse.cy));
    ellipse.setAttribute("rx", svgCoord(brandanEllipse.rx));
    ellipse.setAttribute("ry", svgCoord(brandanEllipse.ry));
    ellipse.setAttribute("fill", "rgba(64, 128, 216, 0.15)");
    ellipse.setAttribute("stroke", "#4080d8");
    ellipse.setAttribute("stroke-width", "2.5");
    ellipse.setAttribute("stroke-dasharray", "8,4");
    svg.appendChild(ellipse);

    // Brandan label
    const bLabel = document.createElementNS("http://www.w3.org/2000/svg", "text");
    bLabel.setAttribute("x", svgCoord(brandanEllipse.cx));
    bLabel.setAttribute("y", svgCoord(brandanEllipse.cy + brandanEllipse.ry) + 16);
    bLabel.setAttribute("text-anchor", "middle");
    bLabel.setAttribute("fill", "#4080d8");
    bLabel.setAttribute("font-size", "14");
    bLabel.setAttribute("font-weight", "bold");
    bLabel.setAttribute("font-family", "Georgia, serif");
    bLabel.textContent = "Brandan";
    svg.appendChild(bLabel);

    // Draw arrows first (behind circles)
    createArrowPath(orangeStops, "#ed7500", "arrowOrange");
    createArrowPath(yellowStops, "#f2c000", "arrowYellow");

    // Draw stops on top
    createStops(orangeStops, "#ed7500", "#fff", "orange");
    createStops(yellowStops, "#f2c000", "#222", "yellow");
  </script>
</body>
</html>
